$(if http-header == "Location")$(link-redirect)$(endif)
<!DOCTYPE html>
<html lang="id">
<!--
<?xml version="1.0" encoding="UTF-8"?>
  <WISPAccessGatewayParam
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:noNamespaceSchemaLocation="http://$(hostname)/xml/WISPAccessGatewayParam.xsd">
    <Redirect>
	<AccessProcedure>1.0</AccessProcedure>
	<AccessLocation>$(location-id)</AccessLocation>
	<LocationName>$(location-name)</LocationName>
	<LoginURL>$(link-login-only)?target=xml</LoginURL>
	<MessageType>100</MessageType>
	<ResponseCode>0</ResponseCode>
    </Redirect>
  </WISPAccessGatewayParam>
-->
<head>
    <title>WiFi Hotspot - UMPKU Surakarta | Login</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logogram.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        .rlogin-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .rlogin-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #E53935, #c62828);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }
        .rlogin-icon::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #E53935;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .rlogin-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        h1 { font-size: 1.3rem; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 0.9rem; color: #4a4a6a; margin-bottom: 15px; }
        .countdown-info { font-size: 0.85rem; color: #4a4a6a; margin-top: 10px; }
        .countdown-info .countdown { font-weight: 600; color: #E53935; }
        .btn-login {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(90deg, #f59e0b, #e85d04);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .btn-login:hover { opacity: 0.9; }
    </style>
</head>

<body>
    <div class="wallpaper-bg"><div class="slide"></div><div class="slide"></div></div>
    <div class="overlay-bg"></div>

    <div class="rlogin-container">
        <div class="rlogin-icon">
            <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        </div>
        <h1>Mengarahkan ke Login...</h1>
        <p>Anda akan dialihkan ke halaman login WiFi UMPKU Surakarta.</p>
        <a href="$(link-login-only)" class="btn-login">Login Sekarang</a>
    </div>
</body>
</html>
