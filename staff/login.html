<!DOCTYPE html>
<html lang="id">
<head>
    <title>WiFi Hotspot - UMPKU Surakarta | Staff</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <link rel="icon" type="image/png" href="img/logogram.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="md5.js" type="text/javascript"></script>
</head>

<body class="role-login">
    <!-- Wallpaper Background -->
    <div class="wallpaper-bg">
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay-bg"></div>

    <section id="home" class="page-section">
        <div class="login-wrapper">
            <div class="login-container">
                <img src="img/logoutama.png" alt="Logo UMPKU" class="login-logo">
                <div class="login-header">
                    <h2>Login Staff</h2>
                    <p>UMPKU Surakarta - Staff</p>
                </div>

                <form name="sendin" action="$(link-login-only)" method="post" onSubmit="return doLogin(this)" id="loginForm">
                    <input type="hidden" name="dst" value="$(link-orig)" />
                    <input type="hidden" name="popup" value="false" />

                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" placeholder="Masukkan username" value="$(username)" autocomplete="username" />
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Masukkan password" autocomplete="current-password" />
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="password-toggle" onclick="togglePwd('password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-wifi"></i>
                        Login Hotspot
                    </button>
                </form>

                <div class="google-auth-wrapper">
                    <a href="https://akses.umpku.ac.id/auth/google?role=staff" class="btn-google">
                        <img src="img/google_logo.png" alt="Google"> Login dengan Google
                    </a>
                </div>

                <a href="https://akses.umpku.ac.id/register-hotspot/staff" class="btn-register" target="_blank">
                    Buat Akun
                </a>

                $(if error)
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>$(error)</span>
                </div>
                $(endif)
            </div>
        </div>
    </section>

    <script type="text/javascript">
        function doLogin(form) {
            form.password.value = hexMD5('$(chap-id)' + form.password.value + '$(chap-challenge)');
            form.submit();
            return false;
        }

        function togglePwd(inputId, btn) {
            var input = document.getElementById(inputId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        var usernameField = document.getElementById('username');
        if (usernameField) usernameField.focus();
    </script>
</body>
</html>
