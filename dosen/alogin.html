<!DOCTYPE html>
<html lang="id">
<head>
    <title>WiFi Hotspot - UMPKU Surakarta | Dosen</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta http-equiv="refresh" content="3;url=$(link-status)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logogram.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        .alogin-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }
        h1 { font-size: 1.3rem; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 0.9rem; color: #4a4a6a; margin-bottom: 15px; }
        .redirect-info { font-size: 0.8rem; color: #4a4a6a; margin-top: 15px; }
        .redirect-info .countdown { font-weight: 600; color: #E53935; }
        a { color: #E53935; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
</head>

<body>
    <div class="wallpaper-bg"><div class="slide"></div><div class="slide"></div></div>
    <div class="overlay-bg"></div>

    <div class="alogin-container">
        <div class="success-icon">&#10003;</div>
        <h1>Login Berhasil!</h1>
        <p>Selamat datang, $(username)</p>
        <p>Anda sekarang terhubung ke WiFi UMPKU Surakarta.</p>
    </div>

    <script>setTimeout(function(){ window.location.href = '$(link-status)'; }, 3000);</script>
</body>
</html>
