$(if http-status == 302)Hotspot redirect$(endif)
$(if http-header == "Location")$(link-redirect)$(endif)
<!DOCTYPE html>
<html lang="id">
<head>
    <title>WiFi Hotspot - UMPKU Surakarta | Redirect</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta http-equiv="refresh" content="0;url=$(link-redirect)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logogram.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        .redirect-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .redirect-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f59e0b, #e85d04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }
        .redirect-icon::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #f59e0b;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .redirect-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        h1 { font-size: 1.3rem; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 0.9rem; color: #4a4a6a; margin-bottom: 15px; }
        .countdown-info { font-size: 0.85rem; color: #4a4a6a; margin-top: 10px; }
        .countdown-info .countdown { font-weight: 600; color: #E53935; }
        .btn-redirect {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(90deg, #f59e0b, #e85d04);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .btn-redirect:hover { opacity: 0.9; }
    </style>
</head>

<body>
    <div class="wallpaper-bg"><div class="slide"></div><div class="slide"></div></div>
    <div class="overlay-bg"></div>

    <div class="redirect-container">
        <div class="redirect-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </div>
        <h1>Mengalihkan Halaman...</h1>
        <p>Anda sedang dialihkan ke halaman tujuan.</p>
        <a href="$(link-redirect)" class="btn-redirect">Klik di sini jika tidak otomatis</a>
    </div>

    <script>window.location.href = '$(link-redirect)';</script>
</body>
</html>
